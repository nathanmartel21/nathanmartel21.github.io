<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog - Nathan Martel</title>
    <link rel="stylesheet" href="../styles/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="../index.html">Nathan Martel</a>
        <nav class="site-nav">
          <a href="../index.html">Home</a>
          <a href="../index.html#about">About</a>
          <a href="../index.html#contact">Contact</a>
          <a href="blog.html" class="active">Blog</a>
        </nav>
      </div>
    </header>

    <main class="container page-content">
      <section class="section">
        <h1>Blog</h1>
        <p>Explore my articles, case studies, and technical notes on automation, cybersecurity, and middleware systems.</p>

        <div class="cards-grid" id="blog-list">
          <p class="loading-copy">Loading blog posts…</p>
        </div>

        <div class="show-more-row">
          <a class="btn btn-primary" href="../index.html">Back to homepage</a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Blog page of Nathan Martel — cybersecurity and automation experience shared.</p>
    </footer>

    <script>
      const formatDate = dateString => {
        if (!dateString) return '';
        const date = new Date(dateString);
        if (Number.isNaN(date.getTime())) return dateString;
        return date.toLocaleDateString('fr-FR', {
          day: 'numeric',
          month: 'long',
          year: 'numeric'
        });
      };

      async function loadBlogPosts() {
        const container = document.getElementById('blog-list');
        try {
          const response = await fetch('blog-posts/posts.json', { cache: 'no-cache' });
          const posts = await response.json();

          container.innerHTML = '';
          posts.forEach(post => {
            const article = document.createElement('article');
            article.className = 'blog-card';

            const tags = Array.isArray(post.tags)
              ? post.tags
              : typeof post.tags === 'string'
              ? post.tags.split(',').map(tag => tag.trim())
              : [];

            const tagChips = tags.map(tag => `<span class="tag">${tag}</span>`).join('');


            article.innerHTML = `
              <div class="card-top">
                <div class="tags">${tagChips}</div>
                <span class="post-date">${formatDate(post.date)}</span>
              </div>
              <h2>${post.title}</h2>
              <p>${post.subtitle}</p>
              <div class="card-footer">
                <span class="read-time">${post.readTime}</span>
                <a class="btn btn-secondary" href="${post.href}">Read post</a>
              </div>
            `;

            container.appendChild(article);
          });
        } catch (error) {
          container.innerHTML = '<p class="loading-copy">Unable to load posts. Please refresh the page.</p>';
          console.error('Error loading blog posts:', error);
        }
      }

      loadBlogPosts();
    </script>
  </body>
</html>
